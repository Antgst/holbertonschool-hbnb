<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List of Places</title>
    <link rel="icon" type="image/png" href="hbnb/images/icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <img src="hbnb/images/logo.png" alt="Application logo" class="logo" />
      <div class="header-title">HBNB - Where comfort meets elegance</div>
      <nav>
        <a href="login.html" id="login-link" class="login-button">Login</a>
        <a href="index.html">Home</a>
      </nav>
    </header>
    <main>
      <section class="hero">
        <div class="hero-content">
          <p class="hero-kicker">Curated premium stays</p>
          <h1>Experience refined stays in exceptional places</h1>
          <p class="hero-text">
            Discover elegant properties, premium comfort, and carefully selected
            destinations designed for memorable stays.
          </p>
          <a href="#filter" class="hero-button">Explore stays</a>
        </div>
      </section>
      <section id="filter">
        <label for="price-filter">Max Price:</label>
        <select id="price-filter">
          <!-- Options will be populated dynamically -->
        </select>
      </section>
      <section id="places-list">
        <!-- List of places will be populated dynamically -->
      </section>
    </main>
    <script src="scripts.js"></script>
    <footer>
      <p>All rights reserved.</p>
    </footer>
  </body>
</html>
