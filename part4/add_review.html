<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Review</title>
    <link rel="icon" type="image/png" href="hbnb/images/icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <a href="index.html" class="brand" aria-label="Go to HBNB home page">
        <img src="hbnb/images/logo.png" alt="Application logo" class="logo" />
        <div class="brand-copy">
          <span class="brand-name">HBNB</span>
          <span class="brand-tagline">Where comfort meets elegance</span>
        </div>
      </a>

      <nav aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="login.html" id="login-link" class="login-button">Login</a>
      </nav>
    </header>

    <main class="review-page">
      <section class="review-page-intro">
        <p class="section-kicker">Guest contribution</p>
        <h1>Add a Review</h1>
        <p>
          Share clear, useful feedback about the stay, comfort, amenities, and
          overall experience.
        </p>
      </section>

      <div class="review-container">
        <section class="place-summary">
          <p class="section-kicker">Selected stay</p>
          <h2>Place Summary</h2>
          <p>Loading place summary...</p>
        </section>

        <form id="review-form" class="review-form">
          <p id="review-message" class="form-message" aria-live="polite"></p>

          <label for="review">Your review</label>
          <textarea
            id="review"
            name="review"
            rows="6"
            placeholder="Describe the stay, comfort, amenities, and overall impression."
            required
          ></textarea>

          <label for="rating">Rating</label>
          <select id="rating" name="rating" required>
            <option value="" selected disabled>Choose a rating</option>
            <option value="1">1 — Very poor</option>
            <option value="2">2 — Fair</option>
            <option value="3">3 — Good</option>
            <option value="4">4 — Very good</option>
            <option value="5">5 — Excellent</option>
          </select>

          <button type="submit">Submit Review</button>
        </form>
      </div>
    </main>

    <footer>
      <p>All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
  </body>
</html>
