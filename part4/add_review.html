<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Review</title>
    <link rel="icon" type="image/png" href="hbnb/images/icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <img src="hbnb/images/logo.png" alt="Application logo" class="logo" />
      <div class="header-title">HBNB - Where comfort meets elegance</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="login.html" id="login-link" class="login-button">Login</a>
      </nav>
    </header>

    <main>
      <div class="review-container">
        <h1>Add a Review</h1>

        <section class="place-summary">
          <h2>Place Summary</h2>
          <p>Loading place summary...</p>
        </section>

        <form id="review-form" class="review-form">
          <p id="review-message" class="form-message" aria-live="polite"></p>

          <label for="review">Add your Review:</label>
          <textarea id="review" name="review" rows="6" required></textarea>

          <label for="rating">Rating:</label>
          <select id="rating" name="rating" required>
            <option value="" selected disabled>Choose a rating</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>

          <button type="submit">Submit your Review</button>
        </form>
      </div>
    </main>

    <footer>
      <p>All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
  </body>
</html>
