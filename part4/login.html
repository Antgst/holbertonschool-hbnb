<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="icon" type="image/png" href="hbnb/images/icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header>
    <a href="index.html" class="brand" aria-label="Go to HBNB home page">
      <img src="hbnb/images/logo.png" alt="Application logo" class="logo" />
      <div class="brand-copy">
        <span class="brand-name">HBNB</span>
        <span class="brand-tagline">Where comfort meets elegance</span>
      </div>
    </a>

    <nav aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="login.html" id="login-link" class="login-button">Login</a>
    </nav>
  </header>

  <main>
    <form id="login-form">
      <h2>Login</h2>
      <p id="login-message" class="form-message" aria-live="polite"></p>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required />

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required />

      <button type="submit">Login</button>
    </form>
  </main>

  <footer>
    <p>All rights reserved.</p>
  </footer>
  <script src="scripts.js"></script>
</body>

</html>
